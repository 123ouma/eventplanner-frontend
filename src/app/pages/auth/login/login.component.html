<div class="auth-page">
  <div class="auth-card">

    <!-- PARTIE GAUCHE IMAGE -->
    <div class="auth-image">
      <div class="auth-overlay">
        <h2>Hello Friend</h2>
        <p>To keep connected with us please login with your personal info</p>
        <a routerLink="/register" class="btn-outline">Sign up</a>
      </div>
    </div>

    <!-- PARTIE DROITE FORM -->
    <div class="auth-form">
      <div class="auth-form-box">

        <h1>Event <span>Planner</span></h1>
        <h2>Sign In to Event Planner</h2>

        <div *ngIf="errorMessage" class="error-box">
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onLogin()">

          <mat-form-field appearance="fill" class="full-width">
            <mat-label>Your Email</mat-label>
            <input matInput type="email" [(ngModel)]="email" name="email" required>
          </mat-form-field>

          <mat-form-field appearance="fill" class="full-width">
            <mat-label>Your Password</mat-label>
            <input matInput type="password" [(ngModel)]="password" name="password" required>
          </mat-form-field>

          <div class="forgot-password">
            <a href="#">Forgot your password ?</a>
          </div>

          <button mat-raised-button color="primary" class="sign-btn" type="submit">
            Sign in
          </button>

        </form>

      </div>
    </div>

  </div>
</div>
