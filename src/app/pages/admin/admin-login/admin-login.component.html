<div class="admin-login-page">
  <mat-card class="admin-login-card">
    <h2>Admin Login</h2>
    <p class="subtitle">Sign in to access the administration panel</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password">
      </mat-form-field>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </mat-card>
</div>
