<app-admin-navbar></app-admin-navbar>

<div class="events-admin-page">
  <div class="events-card">

    <div class="page-header">
      <div>
        <h1>Events <span>Management</span></h1>
        <p class="subtitle">Manage all events in one place</p>
      </div>

      <div class="header-actions">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search events</mat-label>
          <input
            matInput
            (keyup)="applyFilter($event)"
            placeholder="title, location, price..."
          />
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

       <button
  mat-raised-button
  color="primary"
  class="create-btn"
  routerLink="/admin/events/create">
  <mat-icon>add</mat-icon>
  Create Event
</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" matSort class="admin-table">

        <!-- TITLE -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Event</th>
          <td mat-cell *matCellDef="let e">{{ e.title }}</td>
        </ng-container>

        <!-- START DATE -->
        <ng-container matColumnDef="start_date">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Start</th>
          <td mat-cell *matCellDef="let e">{{ e.start_date }}</td>
        </ng-container>

        <!-- END DATE -->
        <ng-container matColumnDef="end_date">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>End</th>
          <td mat-cell *matCellDef="let e">{{ e.end_date }}</td>
        </ng-container>

        <!-- PRICE -->
        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
          <td mat-cell *matCellDef="let e">
            {{ e.price > 0 ? (e.price + ' DT') : 'Free' }}
          </td>
        </ng-container>

        <!-- CAPACITY -->
        <ng-container matColumnDef="capacity">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Capacity</th>
          <td mat-cell *matCellDef="let e">{{ e.capacity }}</td>
        </ng-container>

        <!-- LOCATION -->
        <ng-container matColumnDef="location">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Location</th>
          <td mat-cell *matCellDef="let e">{{ e.location }}</td>
        </ng-container>

        <!-- ACTIONS -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let e">
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>

            <mat-menu #menu="matMenu">
         <button mat-menu-item [routerLink]="['/admin/events/edit', e.id]">
  <mat-icon>edit</mat-icon>
  <span>Edit</span>
</button>

              <button mat-menu-item (click)="deleteEvent(e.id)">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-row" colspan="7">No events found.</td>
        </tr>
      </table>
    </div>

    <mat-paginator
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons>
    </mat-paginator>

  </div>
</div>
